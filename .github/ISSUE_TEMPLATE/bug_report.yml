name: Bug report
description: Something broken in coolify-ssl
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        For security issues, use a [private advisory](https://github.com/loadsignal/coolify-ssl/security/advisories/new) instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / image tag
      placeholder: "0.1.0 or sha-…"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Compose snippet (redact secrets), env vars, and commands.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant container logs (no private keys).
    validations:
      required: false
